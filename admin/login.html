<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Uprise Remodeling — Powered by New Summit Digital</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-brand">
      <img src="assets/nsd-logo.svg" alt="New Summit Digital" class="login-logo">
      <p class="login-subtitle">Client Dashboard</p>
    </div>
    <form id="login-form" class="login-form">
      <h1>Sign In</h1>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <div class="form-row">
        <label class="checkbox-label">
          <input type="checkbox" id="remember-me"> Remember me
        </label>
        <a href="#" id="forgot-password-link" class="forgot-link">Forgot password?</a>
      </div>
      <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
      <div id="login-error" class="error-message" hidden></div>
    </form>
    <div id="forgot-form-container" class="login-form" hidden>
      <h1>Reset Password</h1>
      <p>Enter your email and we'll send a reset link.</p>
      <form id="forgot-form">
        <div class="form-group">
          <label for="reset-email">Email</label>
          <input type="email" id="reset-email" required autocomplete="email">
        </div>
        <button type="submit" class="btn-primary">Send Reset Link</button>
        <a href="#" id="back-to-login" class="forgot-link">Back to login</a>
        <div id="reset-message" class="success-message" hidden></div>
      </form>
    </div>
    <p class="login-footer">Powered by <strong>New Summit Digital</strong></p>
  </div>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
